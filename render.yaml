services:
  - type: web
    name: pokemon-dashboard-api
    runtime: python
    pythonVersion: "3.11.9"
    rootDir: .
    buildCommand: pip install -r backend/requirements-api.txt
    startCommand: sh -c "cd backend && alembic upgrade head && cd .. && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DISABLE_SCHEDULER
        value: "false"
      - key: DATABASE_URL
        sync: false

  - type: web
    name: pokemon-dashboard-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://pokemon-card-dashboard.onrender.com
      - key: PORT
        value: 3000
