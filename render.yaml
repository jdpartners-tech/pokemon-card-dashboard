services:
  - type: web
    name: pokemon-dashboard-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements-api.txt
    startCommand: alembic -c backend/alembic.ini upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DISABLE_SCHEDULER
        value: "true"
      - key: DATABASE_URL
        sync: false
